<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPL Training Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --color-text-primary: #1a1a2e;
  --color-text-secondary: #64748b;
  --color-text-tertiary: #94a3b8;
  --color-text-danger: #ef4444;
  --color-text-success: #16a34a;
  --color-text-info: #2563eb;
  --color-background-page: #f1f5f9;
  --color-background-primary: #ffffff;
  --color-background-secondary: #f8fafc;
  --color-background-info: #eff6ff;
  --color-border-primary: #cbd5e1;
  --color-border-secondary: #e2e8f0;
  --color-border-tertiary: #f1f5f9;
  --color-border-info: #93c5fd;
  --border-radius-sm: 8px;
  --border-radius-md: 12px;
  --border-radius-lg: 18px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
  --accent: #6366f1;
  --accent-light: #eef2ff;
  --accent-dark: #4f46e5;
  --gradient-primary: linear-gradient(135deg, #6366f1, #8b5cf6);
  --swap-bg: #fef3c7;
  --swap-color: #92400e;
  --swap-border: #fcd34d;
  --swap-active-bg: #fde68a;
  --cat-label-bg: #f1f5f9;
  --cat-label-color: #475569;
  --search-bg: #f8fafc;
}
[data-theme="dark"] {
  --color-text-primary: #e2e8f0;
  --color-text-secondary: #94a3b8;
  --color-text-tertiary: #64748b;
  --color-text-danger: #f87171;
  --color-text-success: #4ade80;
  --color-text-info: #60a5fa;
  --color-background-page: #0f172a;
  --color-background-primary: #1e293b;
  --color-background-secondary: #334155;
  --color-background-info: #1e3a5f;
  --color-border-primary: #475569;
  --color-border-secondary: #334155;
  --color-border-tertiary: #1e293b;
  --color-border-info: #3b82f6;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.4);
  --accent-light: #312e81;
  --swap-bg: #422006;
  --swap-color: #fcd34d;
  --swap-border: #78350f;
  --swap-active-bg: #78350f;
  --cat-label-bg: #334155;
  --cat-label-color: #94a3b8;
  --search-bg: #334155;
}
[data-theme="dark"] .badge-up { background: #064e3b; color: #6ee7b7; }
[data-theme="dark"] .badge-down { background: #450a0a; color: #fca5a5; }
[data-theme="dark"] .pill.up { background: #064e3b; color: #6ee7b7; border-color: #065f46; }
[data-theme="dark"] .stat:first-child { background: var(--gradient-primary); }
[data-theme="dark"] input[type=number],
[data-theme="dark"] input[type=date] { color-scheme: dark; }
[data-theme="dark"] .del-btn:hover { background: #450a0a; }
[data-theme="dark"] .add-set-btn:hover { background: #3730a3; }

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  font-size: 14px;
  background: var(--color-background-page);
  color: var(--color-text-primary);
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}

/* ─── Header ─── */
.header {
  background: var(--gradient-primary);
  padding: 24px 20px 18px;
  text-align: center;
  color: #fff;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: -40%; left: -20%;
  width: 140%; height: 200%;
  background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.12) 0%, transparent 60%);
  pointer-events: none;
}
.header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; position: relative; }
.header p { font-size: 13px; opacity: 0.85; margin-top: 4px; position: relative; }
.theme-toggle {
  position: absolute;
  top: 16px; right: 16px;
  background: rgba(255,255,255,0.18);
  border: none; color: #fff;
  width: 40px; height: 40px;
  border-radius: 50%;
  cursor: pointer; font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
  z-index: 10;
  backdrop-filter: blur(4px);
}
.theme-toggle:hover { background: rgba(255,255,255,0.3); }

/* ─── Container ─── */
.app { max-width: 520px; margin: 0 auto; padding: 0 12px 100px; }

/* ─── Nav ─── */
.nav {
  display: flex; gap: 6px; margin: 16px 0 20px;
  background: var(--color-background-primary);
  border-radius: var(--border-radius-lg);
  padding: 5px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--color-border-tertiary);
}
.nav-btn {
  flex: 1; padding: 10px; border: none;
  border-radius: var(--border-radius-md);
  background: transparent; cursor: pointer;
  font-size: 13px; font-weight: 500;
  color: var(--color-text-secondary);
  font-family: var(--font-sans);
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.nav-btn:hover { background: var(--color-background-secondary); }
.nav-btn.active {
  background: var(--gradient-primary); color: #fff;
  box-shadow: 0 2px 8px rgba(99,102,241,0.35);
}
.nav-btn i { font-size: 16px; }

/* ─── Screens ─── */
.screen { display: none; }
.screen.on { display: block; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* ─── Cards ─── */
.card {
  background: var(--color-background-primary);
  border: 1px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 16px 18px; margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.2s, background 0.3s, border-color 0.3s;
}
.card:hover { box-shadow: var(--shadow-md); }

/* ─── Card Title ─── */
.card-title-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px; gap: 8px;
}
.card-title {
  font-size: 15px; font-weight: 600;
  color: var(--color-text-primary);
  display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0;
}
.card-title .exercise-num {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 24px; width: 24px; height: 24px;
  background: var(--accent-light); color: var(--accent);
  border-radius: 8px; font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.exercise-name-text {
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ─── Swap Button ─── */
.swap-btn {
  display: flex; align-items: center; gap: 4px;
  padding: 5px 10px;
  border: 1.5px solid var(--swap-border);
  border-radius: 50px;
  background: var(--swap-bg); color: var(--swap-color);
  font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: var(--font-sans);
  transition: all 0.2s; white-space: nowrap; flex-shrink: 0;
}
.swap-btn:hover { background: var(--swap-active-bg); }
.swap-btn i { font-size: 14px; }

/* ─── Swap Panel ─── */
.swap-panel {
  display: none;
  background: var(--color-background-primary);
  border: 1px solid var(--color-border-secondary);
  border-radius: var(--border-radius-md);
  box-shadow: var(--shadow-lg);
  margin-bottom: 12px;
  overflow: hidden;
  animation: fadeIn 0.2s ease;
  max-height: 380px;
  overflow-y: auto;
}
.swap-panel.open { display: block; }

/* Search inside swap */
.swap-search-wrap {
  padding: 8px 10px;
  border-bottom: 1px solid var(--color-border-tertiary);
  position: sticky; top: 0;
  background: var(--color-background-primary);
  z-index: 2;
}
.swap-search {
  width: 100%; padding: 8px 10px 8px 32px;
  border: 1px solid var(--color-border-secondary);
  border-radius: var(--border-radius-sm);
  background: var(--search-bg);
  color: var(--color-text-primary);
  font-size: 12px; font-family: var(--font-sans);
  transition: border-color 0.2s;
}
.swap-search:focus { outline: none; border-color: var(--accent); }
.swap-search-wrap { position: relative; }
.swap-search-wrap .search-icon {
  position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
  font-size: 14px; color: var(--color-text-tertiary); pointer-events: none;
}

/* Category label */
.swap-cat-label {
  padding: 6px 14px;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--cat-label-color);
  background: var(--cat-label-bg);
  border-bottom: 1px solid var(--color-border-tertiary);
  position: sticky; top: 47px; z-index: 1;
}

.swap-option {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 9px 14px;
  border: none; background: transparent;
  color: var(--color-text-primary);
  font-size: 13px; font-family: var(--font-sans);
  cursor: pointer; text-align: left;
  transition: background 0.15s;
}
.swap-option:hover { background: var(--color-background-secondary); }
.swap-option.selected { background: var(--accent-light); color: var(--accent); font-weight: 600; }
.swap-option .swap-icon {
  font-size: 15px; color: var(--color-text-tertiary); width: 20px; text-align: center; flex-shrink: 0;
}
.swap-option.selected .swap-icon { color: var(--accent); }
.swap-option .muscle-tag {
  margin-left: auto; font-size: 10px; font-weight: 500;
  padding: 2px 7px; border-radius: 50px;
  background: var(--color-background-secondary); color: var(--color-text-tertiary);
  white-space: nowrap; flex-shrink: 0;
}
.swap-option.selected .muscle-tag { background: rgba(99,102,241,0.15); color: var(--accent); }

/* ─── Rows / Inputs ─── */
.row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.lbl {
  font-size: 12px; font-weight: 600; color: var(--color-text-secondary);
  min-width: 50px; text-transform: uppercase; letter-spacing: 0.5px;
}
input[type=number], input[type=date] {
  padding: 8px 10px;
  border: 1px solid var(--color-border-secondary);
  border-radius: var(--border-radius-sm);
  background: var(--color-background-secondary);
  color: var(--color-text-primary);
  font-size: 13px; font-family: var(--font-sans);
  transition: border-color 0.2s, box-shadow 0.2s, background 0.3s;
}
input[type=number] { width: 80px; text-align: center; }
input[type=number]:focus, input[type=date]:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
}

/* ─── Set Grid ─── */
.set-grid-hd {
  display: grid; grid-template-columns: 70px 1fr 1fr 1fr 32px;
  gap: 6px; margin-bottom: 6px; padding: 0 2px;
}
.set-row {
  display: grid; grid-template-columns: 70px 1fr 1fr 1fr 32px;
  gap: 6px; align-items: center; margin-bottom: 6px;
  padding: 4px 2px; border-radius: var(--border-radius-sm);
  transition: background 0.15s;
}
.set-row:hover { background: var(--color-background-secondary); }
.set-lbl { font-size: 11px; color: var(--color-text-secondary); font-weight: 500; }
.col-hd {
  font-size: 10px; color: var(--color-text-tertiary); text-align: center;
  text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600;
}

/* ─── Buttons ─── */
.del-btn {
  background: transparent; border: none; cursor: pointer;
  color: var(--color-text-tertiary); font-size: 16px; padding: 4px;
  border-radius: 6px; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.del-btn:hover { color: var(--color-text-danger); background: #fef2f2; }
.add-set-btn {
  font-size: 12px; font-weight: 500; color: var(--accent);
  background: var(--accent-light);
  border: 1.5px dashed rgba(99,102,241,0.3);
  border-radius: var(--border-radius-sm);
  padding: 8px 12px; cursor: pointer; width: 100%; margin-top: 6px;
  font-family: var(--font-sans); transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 4px;
}
.add-set-btn:hover { background: #e0e7ff; border-color: var(--accent); }
.save-btn {
  width: 100%; padding: 14px; border: none;
  border-radius: var(--border-radius-md);
  background: var(--gradient-primary); color: #fff;
  font-size: 15px; font-weight: 600; cursor: pointer;
  margin-top: 8px; font-family: var(--font-sans);
  box-shadow: 0 4px 14px rgba(99,102,241,0.3);
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.save-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.4); }
.save-btn:active { transform: translateY(0); }

/* ─── Day Tabs ─── */
.day-tabs { display: flex; gap: 6px; }
.day-tab {
  padding: 7px 18px;
  border: 1.5px solid var(--color-border-secondary);
  border-radius: 50px; background: transparent; cursor: pointer;
  font-size: 13px; font-weight: 500; color: var(--color-text-secondary);
  font-family: var(--font-sans); transition: all 0.2s;
}
.day-tab:hover { border-color: var(--accent); color: var(--accent); }
.day-tab.active {
  background: var(--accent-light); color: var(--accent);
  border-color: var(--accent); font-weight: 600;
}

/* ─── Stats ─── */
.stat-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 16px; }
.stat {
  background: var(--color-background-primary);
  border-radius: var(--border-radius-md);
  padding: 16px; border: 1px solid var(--color-border-tertiary);
  box-shadow: var(--shadow-sm); text-align: center;
  transition: background 0.3s, border-color 0.3s;
}
.stat-lbl {
  font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 4px;
  text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
}
.stat-val { font-size: 28px; font-weight: 700; color: var(--color-text-primary); }
.stat:first-child { grid-column: span 2; background: var(--gradient-primary); }
.stat:first-child .stat-lbl { color: rgba(255,255,255,0.8); }
.stat:first-child .stat-val { color: #fff; font-size: 36px; }

/* ─── Select / Legend / Chart ─── */
.ex-select {
  width: 100%; padding: 10px 12px;
  border: 1px solid var(--color-border-secondary);
  border-radius: var(--border-radius-sm);
  background: var(--color-background-secondary);
  color: var(--color-text-primary);
  font-size: 13px; font-family: var(--font-sans);
  margin-bottom: 14px; cursor: pointer;
  transition: border-color 0.2s, background 0.3s;
}
.ex-select:focus { outline: none; border-color: var(--accent); }
.legend { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 10px; font-size: 12px; color: var(--color-text-secondary); }
.legend span { display: flex; align-items: center; gap: 6px; }
.leg-dot { width: 12px; height: 12px; border-radius: 4px; }
.chart-wrap { position: relative; width: 100%; height: 260px; margin-top: 8px; }

/* ─── History ─── */
.history-entry {
  padding: 14px 16px; margin-bottom: 8px;
  background: var(--color-background-primary);
  border-radius: var(--border-radius-md);
  border: 1px solid var(--color-border-tertiary);
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.2s, background 0.3s, border-color 0.3s;
}
.history-entry:hover { box-shadow: var(--shadow-md); }
.h-date { font-size: 11px; color: var(--color-text-tertiary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; }
.h-day { font-size: 15px; font-weight: 600; color: var(--color-text-primary); margin: 3px 0 8px; }
.h-pills { display: flex; flex-wrap: wrap; gap: 6px; }
.pill {
  font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 50px;
  background: var(--color-background-secondary); color: var(--color-text-secondary);
  border: 1px solid var(--color-border-tertiary);
}
.pill.up { background: #ecfdf5; color: #065f46; border-color: #a7f3d0; }

/* ─── Status Badges ─── */
.status-badge {
  font-size: 10px; font-weight: 600; padding: 3px 10px;
  border-radius: 50px; text-align: center;
  text-transform: uppercase; letter-spacing: 0.4px;
}
.badge-up { background: #ecfdf5; color: #065f46; }
.badge-same { background: var(--color-background-secondary); color: var(--color-text-tertiary); }
.badge-down { background: #fef2f2; color: #991b1b; }

.empty {
  font-size: 14px; color: var(--color-text-tertiary);
  padding: 3rem 0; text-align: center; line-height: 1.7;
}
.empty i { font-size: 40px; display: block; margin-bottom: 10px; color: var(--color-border-secondary); }
#save-msg { text-align: center; font-size: 13px; font-weight: 600; color: var(--color-text-success); margin-top: 10px; min-height: 22px; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
[data-theme="dark"] ::-webkit-scrollbar-thumb { background: #475569; }
</style>
</head>
<body>

<div class="header">
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
    <i class="ti ti-moon" id="theme-icon"></i>
  </button>
  <h1>&#127947; PPL Training Tracker</h1>
  <p>Push &middot; Pull &middot; Legs &mdash; Log, Track &amp; Progress</p>
</div>

<div class="app">
  <div class="nav">
    <button class="nav-btn active" onclick="goTo('log')"><i class="ti ti-plus"></i> Log</button>
    <button class="nav-btn" onclick="goTo('progress')"><i class="ti ti-chart-line"></i> Progress</button>
    <button class="nav-btn" onclick="goTo('history')"><i class="ti ti-calendar"></i> History</button>
  </div>

  <div class="screen on" id="sc-log">
    <div class="card" style="margin-bottom:12px">
      <div class="row" style="margin-bottom:0">
        <span class="lbl">Day</span>
        <div class="day-tabs" id="day-tabs">
          <button class="day-tab active" data-day="Pull" onclick="selectDay(this)">Pull</button>
          <button class="day-tab" data-day="Push" onclick="selectDay(this)">Push</button>
          <button class="day-tab" data-day="Legs" onclick="selectDay(this)">Legs</button>
        </div>
      </div>
      <div class="row" style="margin-top:12px;margin-bottom:0">
        <span class="lbl">Date</span>
        <input type="date" id="session-date">
      </div>
    </div>
    <div id="exercises-log"></div>
    <button class="save-btn" onclick="saveSession()"><i class="ti ti-device-floppy"></i> Save Session</button>
    <div id="save-msg"></div>
  </div>

  <div class="screen" id="sc-progress">
    <div class="stat-grid" id="stats-grid"></div>
    <div class="card">
      <div style="margin-bottom:10px">
        <select class="ex-select" id="prog-ex" onchange="renderChart()">
          <option value="">&mdash; Select exercise &mdash;</option>
        </select>
        <div class="legend">
          <span><span class="leg-dot" style="background:#6366f1"></span>Top weight (kg)</span>
          <span><span class="leg-dot" style="background:#10b981"></span>Total volume (kg)</span>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="prog-chart"></canvas></div>
    </div>
  </div>

  <div class="screen" id="sc-history">
    <div id="history-list"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
/* ═══════════════════════════════════════════════════
   FULL EXERCISE POOL — every movement per day
   ═══════════════════════════════════════════════════ */
const EXERCISE_POOL = {
  Pull: {
    Back: [
      'Deadlift','Barbell Deadlift','Trap-Bar Deadlift','Sumo Deadlift','Rack Pull',
      'Lat Pulldown (Wide)','Lat Pulldown (Close)','Lat Pulldown (Neutral)',
      'Pull-Up (BW)','Chin-Up (BW)','Assisted Pull-Up Machine',
      'Seated Row (Cable)','Seated Row (Machine)','T-Bar Row',
      'Barbell Bent-Over Row','Dumbbell Row (Single-Arm)','Pendlay Row',
      'Cable Straight-Arm Pulldown','Meadows Row','Chest-Supported Row',
      'Inverted Row (BW)','Cable Pull-Through','Hyperextension / Back Extension'
    ],
    'Rear Delt': [
      'Face Pull (Seated)','Face Pull (Standing)','Reverse Pec Deck',
      'Rear Delt Fly (DB)','Band Pull-Apart','Cable Reverse Fly',
      'Incline Rear Delt Raise'
    ],
    Biceps: [
      'Biceps Curl (Cable)','EZ-Bar Curl','Barbell Curl','Dumbbell Curl',
      'Hammer Curl (DB)','Rope Cable Curl','Preacher Curl (Machine)',
      'Preacher Curl (EZ-Bar)','Incline Dumbbell Curl','Concentration Curl',
      'Spider Curl','Cross-Body Hammer Curl','Cable Bayesian Curl',
      'Reverse Curl (EZ-Bar)'
    ],
    Abs: [
      'Abs Crunch Machine','Cable Crunch','Hanging Leg Raise','Hanging Knee Raise',
      'Ab Roller','Decline Sit-Up','Plank','Russian Twist',
      'Bicycle Crunch','Dragon Flag','Pallof Press (Cable)',
      'Woodchop (Cable)','V-Up','Toe Touch Crunch'
    ]
  },
  Push: {
    Chest: [

let currentDay = 'Pull';
let progChart = null;

let selectedAlts = {};

/* ─── Theme ─── */
function toggleTheme() {
  const html = document.documentElement;
  const icon = document.getElementById('theme-icon');
  if (html.getAttribute('data-theme') === 'dark') {
    html.removeAttribute('data-theme');
    icon.className = 'ti ti-moon';
    localStorage.setItem('ppl_theme', 'light');
  } else {
    html.setAttribute('data-theme', 'dark');
    icon.className = 'ti ti-sun';
    localStorage.setItem('ppl_theme', 'dark');
  }
}
function loadTheme() {
  const saved = localStorage.getItem('ppl_theme');
  if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('theme-icon').className = 'ti ti-sun';
  }
}

/* ─── Data ─── */
function loadData() {
  try { sessions = JSON.parse(localStorage.getItem('ppl_sessions') || '[]'); } catch(e) { sessions = []; }
}
function saveData() {
  try { localStorage.setItem('ppl_sessions', JSON.stringify(sessions)); } catch(e) {}
}

function selectDay(btn) {
  document.querySelectorAll('.day-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentDay = btn.dataset.day;
  selectedAlts = {};
  renderLogExercises();
}

function getActiveExName(ei) {
  const key = currentDay + '-' + ei;
  return selectedAlts[key] || EXERCISES[currentDay][ei].name;
}

/* ─── Swap Panel ─── */
function toggleSwap(ei) {
  const panel = document.getElementById('swap-panel-' + ei);
  if (!panel) return;
  const isOpen = panel.classList.contains('open');
  document.querySelectorAll('.swap-panel').forEach(d => d.classList.remove('open'));
  if (!isOpen) {
    panel.classList.add('open');
    const input = panel.querySelector('.swap-search');
    if (input) { input.value = ''; filterSwap(ei, ''); input.focus(); }
  }
}

function filterSwap(ei, query) {
  const panel = document.getElementById('swap-panel-' + ei);
  if (!panel) return;
  const q = query.toLowerCase().trim();
  const options = panel.querySelectorAll('.swap-option');
  const catLabels = panel.querySelectorAll('.swap-cat-label');
  // show/hide options
  options.forEach(opt => {
    const name = (opt.dataset.name || '').toLowerCase();
    opt.style.display = (!q || name.includes(q)) ? 'flex' : 'none';
  });
  // show/hide category labels if all children hidden
  catLabels.forEach(lbl => {
    let next = lbl.nextElementSibling;
    let anyVisible = false;
    while (next && !next.classList.contains('swap-cat-label')) {
      if (next.classList.contains('swap-option') && next.style.display !== 'none') anyVisible = true;
      next = next.nextElementSibling;
    }
    lbl.style.display = anyVisible ? '' : 'none';
  });
}

function selectAlt(ei, altName) {
  const key = currentDay + '-' + ei;
  selectedAlts[key] = altName;
  const nameEl = document.getElementById('ex-name-' + ei);
  if (nameEl) nameEl.textContent = altName;
  const panel = document.getElementById('swap-panel-' + ei);
  if (panel) {
    panel.querySelectorAll('.swap-option').forEach(opt => {
      opt.classList.toggle('selected', opt.dataset.name === altName);
    });
    panel.classList.remove('open');
  }
}

/* ─── Build Swap Panel HTML ─── */
function buildSwapHTML(ei) {
  const pool = EXERCISE_POOL[currentDay];
  const activeName = getActiveExName(ei);
  const defaultName = EXERCISES[currentDay][ei].name;
  let html = '';
  html += '<div class="swap-search-wrap"><i class="ti ti-search search-icon"></i>';
  html += '<input class="swap-search" type="text" placeholder="Search exercises..." oninput="filterSwap(' + ei + ', this.value)"></div>';

  // Default exercise first
  html += '<div class="swap-cat-label">\u2b50 Your Default</div>';
  html += buildOptionHTML(ei, defaultName, activeName, 'ti-star', '');

  // All categories
  for (const cat in pool) {
    html += '<div class="swap-cat-label">' + cat.toUpperCase() + '</div>';
    pool[cat].forEach(exName => {
      if (exName === defaultName) return; // already shown above
      html += buildOptionHTML(ei, exName, activeName, 'ti-barbell', cat);
    });
  }
  return html;
}

function buildOptionHTML(ei, exName, activeName, iconClass, muscle) {
  const isSel = exName === activeName;
  const escaped = exName.replace(/'/g, "\\'");
  return '<button class="swap-option' + (isSel ? ' selected' : '') + '" data-name="' + exName + '" onclick="selectAlt(' + ei + ',\'' + escaped + '\')">'
    + '<span class="swap-icon"><i class="ti ' + iconClass + '"></i></span>' + exName
    + (muscle ? '<span class="muscle-tag">' + muscle + '</span>' : '')
    + '</button>';
}

/* ─── Render Log ─── */
function renderLogExercises() {
  const exs = EXERCISES[currentDay];
  const wrap = document.getElementById('exercises-log');
  wrap.innerHTML = '';
  exs.forEach((ex, ei) => {
    const activeName = getActiveExName(ei);

    card.innerHTML =
      '<div class="card-title-row">' +
        '<div class="card-title">' +

          '<span class="exercise-name-text" id="ex-name-' + ei + '">' + activeName + '</span>' +
        '</div>' +
        '<button class="swap-btn" onclick="toggleSwap(' + ei + ')"><i class="ti ti-arrows-exchange"></i> Swap</button>' +
      '</div>' +
      '<div class="swap-panel" id="swap-panel-' + ei + '">' + buildSwapHTML(ei) + '</div>' +
      '<div class="set-grid-hd">' +
        '<span class="col-hd"></span>' +
        '<span class="col-hd">Weight</span>' +
        '<span class="col-hd">Reps</span>' +
        '<span class="col-hd">Status</span>' +
        '<span></span>' +
      '</div>' +
      '<div id="sets-' + ei + '"></div>' +
      '<button class="add-set-btn" onclick="addSet(' + ei + ')"><i class="ti ti-plus"></i> Add set</button>';
    wrap.appendChild(card);
    ex.sets.forEach((s, si) => addSetRow(ei, si, s.label, s.kg, s.reps));

}

function addSetRow(ei, si, label, kg, reps) {
  const container = document.getElementById('sets-' + ei);
  const row = document.createElement('div');
  row.className = 'set-row';
  row.id = 'row-' + ei + '-' + si;
  row.innerHTML =
    '<span class="set-lbl">' + label + '</span>' +
    '<input type="number" id="kg-' + ei + '-' + si + '" value="' + kg + '" min="0" step="0.5" oninput="updateStatus(' + ei + ',' + si + ')">' +
    '<input type="number" id="reps-' + ei + '-' + si + '" value="' + reps + '" min="0" step="1" oninput="updateStatus(' + ei + ',' + si + ')">' +
    '<span id="status-' + ei + '-' + si + '" class="status-badge badge-same">same</span>' +
    '<button class="del-btn" onclick="deleteSetRow(' + ei + ',' + si + ')" aria-label="Delete set"><i class="ti ti-x"></i></button>';
  container.appendChild(row);
  updateStatus(ei, si);
}

function addSet(ei) {
  const container = document.getElementById('sets-' + ei);
  const si = container.children.length;
  const ex = EXERCISES[currentDay][ei];
  const lastSet = ex.sets[ex.sets.length - 1];
  addSetRow(ei, si, 'Set ' + (si+1), lastSet ? lastSet.kg : 0, lastSet ? lastSet.reps : 8);
}

function deleteSetRow(ei, si) {
  const row = document.getElementById('row-' + ei + '-' + si);
  if (row) row.remove();
}

function getLastSessionData(exName) {
  const prev = [...sessions].reverse().find(s => s.exercises && s.exercises[exName]);
  return prev ? prev.exercises[exName] : null;
}

function updateStatus(ei, si) {
  const kgEl = document.getElementById('kg-' + ei + '-' + si);
  const statusEl = document.getElementById('status-' + ei + '-' + si);
  if (!kgEl || !statusEl) return;
  const exName = getActiveExName(ei);
  const prev = getLastSessionData(exName);
  const curKg = parseFloat(kgEl.value) || 0;
  if (!prev || prev.length <= si) { statusEl.textContent = 'new'; statusEl.className = 'status-badge badge-same'; return; }
  const prevKg = prev[si] ? prev[si].kg : 0;
  if (curKg > prevKg) { statusEl.textContent = '\u2B06 PR'; statusEl.className = 'status-badge badge-up'; }
  else if (curKg < prevKg) { statusEl.textContent = '\u2B07 lower'; statusEl.className = 'status-badge badge-down'; }
  else { statusEl.textContent = 'same'; statusEl.className = 'status-badge badge-same'; }
}

function saveSession() {
  const date = document.getElementById('session-date').value || new Date().toISOString().slice(0, 10);
  const exs = EXERCISES[currentDay];
  const exerciseData = {};
  exs.forEach((ex, ei) => {
    const container = document.getElementById('sets-' + ei);
    if (!container) return;
    const rows = container.querySelectorAll('.set-row');
    const sets = [];
    rows.forEach((row, si) => {
      const kgEl = document.getElementById('kg-' + ei + '-' + si);
      const repsEl = document.getElementById('reps-' + ei + '-' + si);
      if (kgEl && repsEl) sets.push({ kg: parseFloat(kgEl.value) || 0, reps: parseInt(repsEl.value) || 0 });
    });
    const activeName = getActiveExName(ei);
    if (sets.length) exerciseData[activeName] = sets;
  });
  sessions.push({ date, day: currentDay, exercises: exerciseData });
  saveData();
  const msg = document.getElementById('save-msg');
  msg.textContent = '\u2705 Session saved successfully!';
  setTimeout(() => msg.textContent = '', 2500);
  populateProgressSelect();
  renderStats();
}

function populateProgressSelect() {
  const sel = document.getElementById('prog-ex');
  const current = sel.value;
  sel.innerHTML = '<option value="">\u2014 Select exercise \u2014</option>';
  const allEx = new Set();
  sessions.forEach(s => Object.keys(s.exercises || {}).forEach(k => allEx.add(k)));
  [...allEx].sort().forEach(ex => {
    const o = document.createElement('option');
    o.value = ex; o.textContent = ex;
    sel.appendChild(o);
  });
  if (current) sel.value = current;
}

function renderStats() {
  const grid = document.getElementById('stats-grid');
  const t = sessions.length;
  const pu = sessions.filter(s => s.day === 'Pull').length;
  const ps = sessions.filter(s => s.day === 'Push').length;
  const lg = sessions.filter(s => s.day === 'Legs').length;
  grid.innerHTML =
    '<div class="stat"><div class="stat-lbl">Total Sessions</div><div class="stat-val">' + t + '</div></div>' +
    '<div class="stat"><div class="stat-lbl">Pull Days</div><div class="stat-val">' + pu + '</div></div>' +
    '<div class="stat"><div class="stat-lbl">Push Days</div><div class="stat-val">' + ps + '</div></div>' +
    '<div class="stat"><div class="stat-lbl">Legs Days</div><div class="stat-val">' + lg + '</div></div>';
}

function renderChart() {
  const exName = document.getElementById('prog-ex').value;
  const canvas = document.getElementById('prog-chart');
  if (progChart) { progChart.destroy(); progChart = null; }
  if (!exName) return;
  const relevant = sessions.filter(s => s.exercises && s.exercises[exName]).map(s => {
    const sets = s.exercises[exName];
    const topWeight = Math.max(...sets.map(x => x.kg));
    const volume = sets.reduce((a, x) => a + x.kg * x.reps, 0);
    return { date: s.date, topWeight, volume };
  }).sort((a, b) => a.date.localeCompare(b.date));
  if (!relevant.length) return;
  const labels = relevant.map(r => r.date.slice(5));
  progChart = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label:'Top weight (kg)', data:relevant.map(r=>r.topWeight), borderColor:'#6366f1', backgroundColor:'rgba(99,102,241,0.1)', tension:0.4, pointRadius:5, pointBackgroundColor:'#6366f1', pointBorderColor:'#fff', pointBorderWidth:2, fill:true, yAxisID:'y' },
        { label:'Volume (kg)', data:relevant.map(r=>Math.round(r.volume)), borderColor:'#10b981', backgroundColor:'rgba(16,185,129,0.1)', tension:0.4, pointRadius:5, pointBackgroundColor:'#10b981', pointBorderColor:'#fff', pointBorderWidth:2, borderDash:[5,3], fill:true, yAxisID:'y2' }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{autoSkip:false,maxRotation:45,font:{size:11}},grid:{color:'rgba(148,163,184,0.1)'}},
        y:{position:'left',title:{display:true,text:'kg (weight)',font:{size:11,weight:'600'}},ticks:{font:{size:11}},grid:{color:'rgba(148,163,184,0.1)'}},
        y2:{position:'right',title:{display:true,text:'kg (volume)',font:{size:11,weight:'600'}},ticks:{font:{size:11}},grid:{drawOnChartArea:false}}
      }
    }
  });
}

function renderHistory() {
  const wrap = document.getElementById('history-list');
  if (!sessions.length) {
    wrap.innerHTML = '<div class="empty"><i class="ti ti-calendar-off"></i>No sessions logged yet.<br>Start by logging your first workout!</div>';
    return;
  }
  wrap.innerHTML = '';
  [...sessions].reverse().forEach(s => {
    const exNames = Object.keys(s.exercises || {});
    const topSets = exNames.slice(0, 4).map(n => {
      const sets = s.exercises[n];
      const top = Math.max(...sets.map(x => x.kg));
      return n + ': ' + top + 'kg';
    });
    const div = document.createElement('div');
    div.className = 'history-entry';
    div.innerHTML = '<div class="h-date">' + s.date + '</div>' +
      '<div class="h-day">' + s.day + ' Day</div>' +
      '<div class="h-pills">' + topSets.map(t => '<span class="pill">' + t + '</span>').join('') +
      (exNames.length > 4 ? '<span class="pill">+' + (exNames.length-4) + ' more</span>' : '') + '</div>';
    wrap.appendChild(div);
  });
}

function goTo(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sc-' + screen).classList.add('on');
  event.target.closest('.nav-btn').classList.add('active');
  if (screen === 'progress') { renderStats(); populateProgressSelect(); renderChart(); }
  if (screen === 'history') renderHistory();
}

// Close swap panels on outside click
document.addEventListener('click', function(e) {
  if (!e.target.closest('.swap-btn') && !e.target.closest('.swap-panel')) {
    document.querySelectorAll('.swap-panel').forEach(d => d.classList.remove('open'));
  }
});

// Init
const today = new Date().toISOString().slice(0, 10);
document.getElementById('session-date').value = today;
loadTheme();
loadData();
renderLogExercises();
