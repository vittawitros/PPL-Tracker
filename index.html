<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPL Training Tracker v5</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --color-text-primary: #1a1a2e;
  --color-text-secondary: #64748b;
  --color-text-tertiary: #94a3b8;
  --color-text-danger: #ef4444;
  --color-text-success: #16a34a;
  --color-text-info: #2563eb;
  --color-background-page: #f1f5f9;
  --color-background-primary: #ffffff;
  --color-background-secondary: #f8fafc;
  --color-background-info: #eff6ff;
  --color-border-primary: #cbd5e1;
  --color-border-secondary: #e2e8f0;
  --color-border-tertiary: #f1f5f9;
  --border-radius-sm: 8px;
  --border-radius-md: 12px;
  --border-radius-lg: 18px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
  --accent: #6366f1;
  --accent-light: #eef2ff;
  --gradient-primary: linear-gradient(135deg, #6366f1, #8b5cf6);
  --swap-bg: #fef3c7;
  --swap-color: #92400e;
  --swap-border: #fcd34d;
  --swap-active-bg: #fde68a;
  --cat-label-bg: #f1f5f9;
  --cat-label-color: #475569;
  --search-bg: #f8fafc;
  --success-bg: #ecfdf5;
  --danger-bg: #fef2f2;
  --info-bg: #eff6ff;
}
[data-theme="dark"] {
  --color-text-primary: #e2e8f0;
  --color-text-secondary: #94a3b8;
  --color-text-tertiary: #64748b;
  --color-text-danger: #f87171;
  --color-text-success: #4ade80;
  --color-text-info: #60a5fa;
  --color-background-page: #0f172a;
  --color-background-primary: #1e293b;
  --color-background-secondary: #334155;
  --color-background-info: #1e3a5f;
  --color-border-primary: #475569;
  --color-border-secondary: #334155;
  --color-border-tertiary: #1e293b;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.4);
  --accent-light: #312e81;
  --swap-bg: #422006;
  --swap-color: #fcd34d;
  --swap-border: #78350f;
  --swap-active-bg: #78350f;
  --cat-label-bg: #334155;
  --cat-label-color: #94a3b8;
  --search-bg: #334155;
  --success-bg: #064e3b;
  --danger-bg: #450a0a;
  --info-bg: #1e3a5f;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); font-size: 14px; background: var(--color-background-page); color: var(--color-text-primary); min-height: 100vh; transition: background 0.3s, color 0.3s; }
.header { background: var(--gradient-primary); padding: 24px 20px 18px; text-align: center; color: #fff; position: relative; overflow: hidden; }
.header::before { content: ''; position: absolute; top: -40%; left: -20%; width: 140%; height: 200%; background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.12) 0%, transparent 60%); pointer-events: none; }
.header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; position: relative; }
.header p { font-size: 13px; opacity: 0.85; margin-top: 4px; position: relative; }
.theme-toggle { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.18); border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; z-index: 10; backdrop-filter: blur(4px); }
.theme-toggle:hover { background: rgba(255,255,255,0.3); }
.app { max-width: 540px; margin: 0 auto; padding: 0 12px 100px; }
.nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin: 16px 0 20px; background: var(--color-background-primary); border-radius: var(--border-radius-lg); padding: 5px; box-shadow: var(--shadow-sm); border: 1px solid var(--color-border-tertiary); }
.nav-btn { padding: 10px; border: none; border-radius: var(--border-radius-md); background: transparent; cursor: pointer; font-size: 12px; font-weight: 500; color: var(--color-text-secondary); font-family: var(--font-sans); transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
.nav-btn:hover { background: var(--color-background-secondary); }
.nav-btn.active { background: var(--gradient-primary); color: #fff; box-shadow: 0 2px 8px rgba(99,102,241,0.35); }
.nav-btn i { font-size: 15px; }
.screen { display: none; }
.screen.on { display: block; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.card { background: var(--color-background-primary); border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 16px 18px; margin-bottom: 12px; box-shadow: var(--shadow-sm); transition: box-shadow 0.2s, background 0.3s, border-color 0.3s; }
.card:hover { box-shadow: var(--shadow-md); }
.card-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 8px; flex-wrap: wrap; }
.card-title { font-size: 15px; font-weight: 600; color: var(--color-text-primary); display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
.card-title .exercise-num { display: inline-flex; align-items: center; justify-content: center; min-width: 24px; width: 24px; height: 24px; background: var(--accent-light); color: var(--accent); border-radius: 8px; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.exercise-name-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.swap-btn { display: flex; align-items: center; gap: 4px; padding: 5px 10px; border: 1.5px solid var(--swap-border); border-radius: 50px; background: var(--swap-bg); color: var(--swap-color); font-size: 11px; font-weight: 600; cursor: pointer; font-family: var(--font-sans); transition: all 0.2s; white-space: nowrap; flex-shrink: 0; }
.swap-btn:hover { background: var(--swap-active-bg); }
.swap-panel { display: none; background: var(--color-background-primary); border: 1px solid var(--color-border-secondary); border-radius: var(--border-radius-md); box-shadow: var(--shadow-lg); margin-bottom: 12px; overflow: hidden; animation: fadeIn 0.2s ease; max-height: 380px; overflow-y: auto; }
.swap-panel.open { display: block; }
.swap-search-wrap { padding: 8px 10px; border-bottom: 1px solid var(--color-border-tertiary); position: sticky; top: 0; background: var(--color-background-primary); z-index: 2; }
.swap-search { width: 100%; padding: 8px 10px 8px 32px; border: 1px solid var(--color-border-secondary); border-radius: var(--border-radius-sm); background: var(--search-bg); color: var(--color-text-primary); font-size: 12px; font-family: var(--font-sans); }
.swap-search-wrap .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--color-text-tertiary); }
.swap-cat-label { padding: 6px 14px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--cat-label-color); background: var(--cat-label-bg); border-bottom: 1px solid var(--color-border-tertiary); position: sticky; top: 47px; z-index: 1; }
.swap-option { display: flex; align-items: center; gap: 8px; width: 100%; padding: 9px 14px; border: none; background: transparent; color: var(--color-text-primary); font-size: 13px; font-family: var(--font-sans); cursor: pointer; text-align: left; transition: background 0.15s; }
.swap-option:hover { background: var(--color-background-secondary); }
.swap-option.selected { background: var(--accent-light); color: var(--accent); font-weight: 600; }
.swap-option .swap-icon { font-size: 15px; color: var(--color-text-tertiary); width: 20px; text-align: center; flex-shrink: 0; }
.swap-option.selected .swap-icon { color: var(--accent); }
.swap-option .muscle-tag { margin-left: auto; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 50px; background: var(--color-background-secondary); color: var(--color-text-tertiary); white-space: nowrap; flex-shrink: 0; }
.swap-option.selected .muscle-tag { background: rgba(99,102,241,0.15); color: var(--accent); }
.row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.lbl { font-size: 12px; font-weight: 600; color: var(--color-text-secondary); min-width: 50px; text-transform: uppercase; letter-spacing: 0.5px; }
input[type=number], input[type=date], input[type=text], textarea { padding: 8px 10px; border: 1px solid var(--color-border-secondary); border-radius: var(--border-radius-sm); background: var(--color-background-secondary); color: var(--color-text-primary); font-size: 13px; font-family: var(--font-sans); }
input[type=number] { width: 80px; text-align: center; }
textarea { width: 100%; min-height: 110px; resize: vertical; }
input[type=number]:focus, input[type=date]:focus, input[type=text]:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
.set-grid-hd { display: grid; grid-template-columns: 70px 1fr 1fr 1fr 32px; gap: 6px; margin-bottom: 6px; padding: 0 2px; }
.set-row { display: grid; grid-template-columns: 70px 1fr 1fr 1fr 32px; gap: 6px; align-items: center; margin-bottom: 6px; padding: 4px 2px; border-radius: var(--border-radius-sm); transition: background 0.15s; }
.set-row:hover { background: var(--color-background-secondary); }
.set-lbl { font-size: 11px; color: var(--color-text-secondary); font-weight: 500; }
.col-hd { font-size: 10px; color: var(--color-text-tertiary); text-align: center; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; }
.del-btn { background: transparent; border: none; cursor: pointer; color: var(--color-text-tertiary); font-size: 16px; padding: 4px; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
.del-btn:hover { color: var(--color-text-danger); background: var(--danger-bg); }
.add-set-btn, .tool-btn, .secondary-btn, .danger-btn { font-size: 12px; font-weight: 600; border-radius: var(--border-radius-sm); padding: 10px 12px; cursor: pointer; font-family: var(--font-sans); display: inline-flex; align-items: center; justify-content: center; gap: 6px; border: 1px solid var(--color-border-secondary); }
.add-set-btn { color: var(--accent); background: var(--accent-light); border: 1.5px dashed rgba(99,102,241,0.3); width: 100%; margin-top: 6px; }
.add-set-btn:hover { background: #e0e7ff; }
.tool-btn { background: var(--gradient-primary); color: #fff; border: none; box-shadow: 0 4px 14px rgba(99,102,241,0.2); }
.secondary-btn { background: var(--color-background-secondary); color: var(--color-text-primary); }
.danger-btn { background: var(--danger-bg); color: var(--color-text-danger); border-color: rgba(239,68,68,0.2); }
.save-btn { width: 100%; padding: 14px; border: none; border-radius: var(--border-radius-md); background: var(--gradient-primary); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; font-family: var(--font-sans); box-shadow: 0 4px 14px rgba(99,102,241,0.3); display: flex; align-items: center; justify-content: center; gap: 8px; }
.day-tabs { display: flex; gap: 6px; }
.day-tab { padding: 7px 18px; border: 1.5px solid var(--color-border-secondary); border-radius: 50px; background: transparent; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--color-text-secondary); font-family: var(--font-sans); }
.day-tab.active { background: var(--accent-light); color: var(--accent); border-color: var(--accent); font-weight: 600; }
.stat-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 16px; }
.stat { background: var(--color-background-primary); border-radius: var(--border-radius-md); padding: 16px; border: 1px solid var(--color-border-tertiary); box-shadow: var(--shadow-sm); text-align: center; }
.stat-lbl { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.stat-val { font-size: 28px; font-weight: 700; color: var(--color-text-primary); }
.stat:first-child { grid-column: span 2; background: var(--gradient-primary); }
.stat:first-child .stat-lbl { color: rgba(255,255,255,0.8); }
.stat:first-child .stat-val { color: #fff; font-size: 36px; }
.ex-select { width: 100%; padding: 10px 12px; border: 1px solid var(--color-border-secondary); border-radius: var(--border-radius-sm); background: var(--color-background-secondary); color: var(--color-text-primary); font-size: 13px; margin-bottom: 14px; }
.legend { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 10px; font-size: 12px; color: var(--color-text-secondary); }
.legend span { display: flex; align-items: center; gap: 6px; }
.leg-dot { width: 12px; height: 12px; border-radius: 4px; }
.chart-wrap { position: relative; width: 100%; height: 260px; margin-top: 8px; }
.empty { font-size: 14px; color: var(--color-text-tertiary); padding: 3rem 0; text-align: center; line-height: 1.7; }
.empty i { font-size: 40px; display: block; margin-bottom: 10px; color: var(--color-border-secondary); }
#save-msg { text-align: center; font-size: 13px; font-weight: 600; color: var(--color-text-success); margin-top: 10px; min-height: 22px; }
.section-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.muted { color: var(--color-text-secondary); font-size: 12px; line-height: 1.6; }
.small { font-size: 11px; color: var(--color-text-tertiary); line-height: 1.5; }
.tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.field label { font-size: 11px; font-weight: 700; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
.field.full { grid-column: 1 / -1; }
.checkbox-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
.checkbox-row input { width: 16px; height: 16px; }
.status-line { margin-top: 10px; padding: 10px 12px; border-radius: var(--border-radius-sm); background: var(--color-background-secondary); color: var(--color-text-secondary); font-size: 12px; line-height: 1.5; }
.connected { color: var(--color-text-success); }
.disconnected { color: var(--color-text-danger); }
.connected-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: currentColor; margin-right: 6px; }
.tip-list { margin-top: 10px; padding-left: 18px; color: var(--color-text-secondary); font-size: 12px; line-height: 1.65; }
.tip-list li { margin-bottom: 4px; }
.inline-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
.hidden { display: none !important; }
.status-badge { font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 50px; text-align: center; text-transform: uppercase; letter-spacing: 0.4px; }
.badge-up { background: var(--success-bg); color: var(--color-text-success); }
.badge-same { background: var(--color-background-secondary); color: var(--color-text-tertiary); }
.badge-down { background: var(--danger-bg); color: var(--color-text-danger); }

/* === v5: Per-exercise save + delete (Mode B) === */
.card-actions { display: flex; gap: 6px; flex-shrink: 0; align-items: center; flex-wrap: wrap; }
.save-ex-btn { display: flex; align-items: center; gap: 4px; padding: 5px 10px; border: 1.5px solid #16a34a; border-radius: 50px; background: var(--success-bg); color: var(--color-text-success); font-size: 11px; font-weight: 600; cursor: pointer; font-family: var(--font-sans); transition: all 0.2s; white-space: nowrap; }
.save-ex-btn:hover { background: #d1fae5; }
.save-ex-btn.saved { background: #16a34a; color: #fff; border-color: #16a34a; transform: scale(1.05); }
[data-theme="dark"] .save-ex-btn:hover { background: #047857; }
.delete-ex-btn { display: flex; align-items: center; gap: 4px; padding: 5px 10px; border: 1.5px solid #ef4444; border-radius: 50px; background: var(--danger-bg); color: var(--color-text-danger); font-size: 11px; font-weight: 600; cursor: pointer; font-family: var(--font-sans); transition: all 0.2s; white-space: nowrap; }
.delete-ex-btn:hover { background: #fecaca; }
[data-theme="dark"] .delete-ex-btn:hover { background: #7f1d1d; }
.ex-save-msg { font-size: 11px; color: var(--color-text-success); margin-top: 8px; min-height: 14px; font-weight: 500; text-align: right; }
.ex-save-msg.warn { color: var(--color-text-danger); }

/* === v5: History with expand + delete === */
.history-entry { padding: 14px 16px; margin-bottom: 8px; background: var(--color-background-primary); border-radius: var(--border-radius-md); border: 1px solid var(--color-border-tertiary); box-shadow: var(--shadow-sm); cursor: pointer; transition: box-shadow 0.2s, border-color 0.2s; }
.history-entry:hover { box-shadow: var(--shadow-md); border-color: var(--color-border-secondary); }
.history-entry.expanded { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(99,102,241,0.12); }
.history-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.history-head-main { flex: 1; min-width: 0; }
.h-date { font-size: 11px; color: var(--color-text-tertiary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; }
.h-day { font-size: 15px; font-weight: 600; color: var(--color-text-primary); margin: 3px 0 8px; display: flex; align-items: center; gap: 6px; }
.h-day .expand-chevron { font-size: 14px; color: var(--color-text-tertiary); transition: transform 0.2s; }
.history-entry.expanded .h-day .expand-chevron { transform: rotate(90deg); color: var(--accent); }
.h-pills { display: flex; flex-wrap: wrap; gap: 6px; }
.pill { font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 50px; background: var(--color-background-secondary); color: var(--color-text-secondary); border: 1px solid var(--color-border-tertiary); }
.history-del-session { background: transparent; border: 1.5px solid var(--color-border-secondary); color: var(--color-text-tertiary); cursor: pointer; padding: 6px 8px; border-radius: 50px; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.2s; flex-shrink: 0; }
.history-del-session:hover { border-color: #ef4444; background: var(--danger-bg); color: var(--color-text-danger); }
.history-detail { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--color-border-secondary); animation: fadeIn 0.25s ease; }
.history-entry.expanded .history-detail { display: block; }
.history-ex-block { background: var(--color-background-secondary); border-radius: var(--border-radius-sm); padding: 10px 12px; margin-bottom: 8px; }
.history-ex-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; gap: 8px; }
.history-ex-name { font-size: 13px; font-weight: 600; color: var(--color-text-primary); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.history-ex-del { background: transparent; border: 1px solid var(--color-border-secondary); color: var(--color-text-tertiary); cursor: pointer; padding: 3px 8px; border-radius: 50px; font-size: 10px; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; transition: all 0.2s; flex-shrink: 0; font-family: var(--font-sans); }
.history-ex-del:hover { background: var(--danger-bg); border-color: #ef4444; color: var(--color-text-danger); }
.history-set-list { display: flex; flex-wrap: wrap; gap: 4px; }
.history-set-pill { font-size: 11px; padding: 3px 8px; border-radius: 50px; background: var(--color-background-primary); border: 1px solid var(--color-border-tertiary); color: var(--color-text-secondary); font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace; }

@media (max-width: 520px) { .field-grid, .tool-grid { grid-template-columns: 1fr; } .nav { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<div class="header">
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode"><i class="ti ti-moon" id="theme-icon"></i></button>
  <h1>&#127947; PPL Training Tracker</h1>
  <p>Push &middot; Pull &middot; Legs &mdash; v5 with full edit/delete</p>
</div>

<div class="app">
  <div class="nav">
    <button class="nav-btn active" onclick="goTo('log', event)"><i class="ti ti-plus"></i> Log</button>
    <button class="nav-btn" onclick="goTo('progress', event)"><i class="ti ti-chart-line"></i> Progress</button>
    <button class="nav-btn" onclick="goTo('history', event)"><i class="ti ti-calendar"></i> History</button>
    <button class="nav-btn" onclick="goTo('data', event)"><i class="ti ti-database"></i> Data</button>
  </div>

  <div class="screen on" id="sc-log">
    <div class="card" style="margin-bottom:12px">
      <div class="row" style="margin-bottom:0">
        <span class="lbl">Day</span>
        <div class="day-tabs" id="day-tabs">
          <button class="day-tab active" data-day="Pull" onclick="selectDay(this)">Pull</button>
          <button class="day-tab" data-day="Push" onclick="selectDay(this)">Push</button>
          <button class="day-tab" data-day="Legs" onclick="selectDay(this)">Legs</button>
        </div>
      </div>
      <div class="row" style="margin-top:12px;margin-bottom:0">
        <span class="lbl">Date</span>
        <input type="date" id="session-date">
      </div>
    </div>
    <div id="exercises-log"></div>
    <button class="save-btn" onclick="saveSession()"><i class="ti ti-device-floppy"></i> Save Session</button>
    <div id="save-msg"></div>
  </div>

  <div class="screen" id="sc-progress">
    <div class="stat-grid" id="stats-grid"></div>
    <div class="card">
      <select class="ex-select" id="prog-ex" onchange="renderChart()">
        <option value="">&mdash; Select exercise &mdash;</option>
      </select>
      <div class="legend">
        <span><span class="leg-dot" style="background:#6366f1"></span>Top weight (kg)</span>
